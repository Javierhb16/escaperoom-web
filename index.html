<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javi Fiestas - Scape Room</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <img src="img/pinto2.png" id="pinto" alt="Personaje izquierda" class="izquierda">

    <div class="dinero" id="dinero"></div>

    <div id="main">
        <div class="escena" id="escena"></div>
        <div class="inicio" id="inicio" onclick="jugar()"></div>
        <div class="casa" id="casa" onclick="irCasa()"></div>
        <div class="parada" id="parada" onclick="irParada()"></div>
        <div class="bus" id="bus" onclick="bus()"></div>
        <div class="dentroCasa" id="dentroCasa" onclick="dentroCasa()"></div>
        <div class="puertaExit" id="puertaExit" onclick="salirCasa()"></div>
        <div class="cocina" id="cocina" onclick="irCocina()"></div>

        <div class="patio" id="patio" onclick="irPatio()"></div>
        <div class="volverDentro" id="volverDentro" onclick="volverDentro()"></div>
        <div class="volverSalon" id="volverSalon" onclick="volverSalon()"></div>
        <img class="monedaNano" id="monedaNano"></img>
        <div class="minijuegoNano" id="minijuegoNano" onclick="minijuegoNano()"></div>
        <div class="ecuaciones" id="ecuaciones"></div>
        <div class="banyo" id="banyo" onclick="irBanyo()"></div>
        <div class="salirBanyo" id="salirBanyo" onclick="salirBanyo()"></div>
        <div class="minijuegoBanyo" id="minijuegoBanyo" onclick="minijuegoBanyo()"></div>

        <div class="minijuegoBellingham" id="minijuegoBellingham" onclick="minijuegoBellingham()"></div>
        <div class="botella1" id="botella1" onclick="cogerBotella1()"></div>
        <div class="botella2" id="botella2" onclick="cogerBotella2()"></div>
        <div class="botella3" id="botella3" onclick="cogerBotella3()"></div>
        
        <div class="bobesponja" id="bobesponja" onclick="sonidoBob()"><audio id="miAudioBob"
                src="audio/audiobob.mp3"></audio></div>
        <div class="gato" id="gato" onclick="miau()"><audio id="miau" src="audio/miau.mp3"></audio></div>
        <div class="batman" id="batman" onclick="noche()"><audio id="audioBatman" src="audio/audioBatman.mp3"></audio></div>
        <div class="peter" id="peter" onclick="audioPeter()"><audio id="sonidoPeter" src="audio/peter.mp3"></audio></div>
        <div class="homer" id="homer" onclick="audioHomer()"><audio id="sonidoHomer" src="audio/audioHomer.mp3"></audio></div>
        <div class="audioNano" >           
            <audio id="audioNano" src="audio/elNano.mp3"></audio>
        </div>
        <div class="audioBellingham" >
            <audio id="audioBellingham" src="audio/audioBellingham.mp3"></audio>
        </div>
        <div class="audioYay">
            <audio src="audio/yay.mp3" id="audioYay"></audio>
        </div>
        <div class="audioWomp">
            <audio src="audio/womp.mp3" id="audioWomp"></audio>
        </div>
        <div class="destello" id="destello"></div>
        <div class="nariz" id="nariz" onclick="sonidoNariz()">
            <audio id="fredy" src="audio/fredy.mp3"></audio>
        </div>

        <div class="objetivo" id="objetivo"></div>

        <div class="texto" id="texto">
            <span id="habla"></span>
            <span id="parrafo">
                Aquí irá la historia o las pistas del Scape Room...
            </span>
        </div>
    </div>
    <img src="img/javi.png" id="javi" alt="Personaje derecha" class="derecha">

    <script src="script.js"></script>

</body>

</html>
